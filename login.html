<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập — Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="./css/admin.css" />
</head>
<body class="login-body">
  <div class="login-bg">
    <div class="orb-bg o1"></div>
    <div class="orb-bg o2"></div>
  </div>

  <div class="login-card">
    <div class="login-logo">
      <i class="fa-solid fa-shield-halved"></i>
    </div>
    <h1>Admin Login</h1>
    <p class="login-sub">Đăng nhập để quản lý portfolio</p>

    <form id="loginForm">
      <label><i class="fa-solid fa-envelope"></i> Email</label>
      <input
        type="email"
        id="username"
        autocomplete="email"
        placeholder="example@gmail.com"
        required
        autofocus
      />

      <label><i class="fa-solid fa-lock"></i> Mật khẩu</label>
      <div class="password-wrap">
        <input
          type="password"
          id="password"
          autocomplete="current-password"
          placeholder="Nhập mật khẩu"
          required
        />
        <button type="button" id="togglePwd" class="toggle-pwd">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button type="submit" class="btn btn-primary login-btn">
        <i class="fa-solid fa-arrow-right-to-bracket"></i> Đăng nhập
      </button>
    </form>

    <div class="login-footer">
      <a href="./index.html"><i class="fa-solid fa-arrow-left"></i> Về trang chủ</a>
    </div>
  </div>

  <script src="./js/auth.js"></script>
  <script>
    // Nếu đã đăng nhập rồi thì chuyển thẳng vào admin
    if (isAuthenticated()) window.location.href = './admin.html';

    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (login(username, password)) {
        errorMsg.textContent = '';
        window.location.href = './admin.html';
      } else {
        errorMsg.textContent = '❌ Sai email hoặc mật khẩu!';
        document.getElementById('password').value = '';
      }
    });

    // Toggle hiện / ẩn mật khẩu
    document.getElementById('togglePwd').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const icon = document.querySelector('#togglePwd i');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'fa-solid fa-eye-slash';
      } else {
        pwd.type = 'password';
        icon.className = 'fa-solid fa-eye';
      }
    });
  </script>
</body>
</html>
